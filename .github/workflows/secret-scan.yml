name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  betterleaks:
    name: Betterleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            # The PR merge-ref checkout does not always contain base.sha, so fetch it.
            git fetch --no-tags --quiet origin "$base"
            echo "log_opts=$base..HEAD" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=-1" >> "$GITHUB_OUTPUT"
          else
            echo "log_opts=${{ github.event.before }}..${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan commits with Betterleaks
        run: |
          # git inside the container runs as a different uid than the mounted
          # workspace owner; set safe.directory via env so it does not refuse
          # with "detected dubious ownership" (no writes to a global gitconfig).
          docker run --rm -v "$GITHUB_WORKSPACE:/repo" \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            ghcr.io/betterleaks/betterleaks:v1.3.1 \
            git /repo --redact --no-banner --log-opts="${{ steps.range.outputs.log_opts }}"
