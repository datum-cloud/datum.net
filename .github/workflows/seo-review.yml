name: SEO Review

on:
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'env.example'
      - '.vscode/**'
  schedule:
    # Weekly full-site audit at 06:00 UTC on Sundays (off-peak hours for both US and EU traffic).
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        type: choice
        default: 'full'
        options:
          - changed-only
          - full

concurrency:
  group: seo-review-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  seo-review:
    name: SEO & Meta Review
    # Skip for bot-authored PRs (renovate, dependabot, etc.); scheduled and
    # manual runs always proceed.
    if: github.event_name != 'pull_request' || github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
      HUSKY: 0
      ASTRO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # Audit the production output: NODE_ENV=production matches the deploy
        # build (Dockerfile) so indexability/analytics reflect the live site
        # instead of being forced to noindex by the dev-mode default.
        env:
          NODE_ENV: production
        run: npm run build

      - name: Collect changed page files (PR only)
        if: github.event_name == 'pull_request'
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          # The PR merge-ref checkout does not always contain base.sha, so a bare
          # `git diff "$base"` dies with "fatal: bad object". Fetch both commits
          # explicitly, then diff with merge-base (three-dot) semantics. No `|| true`:
          # a broken diff must fail the job, not silently report "no changes".
          git fetch --no-tags --quiet origin "$base" "$head"
          changed="$(git diff --name-only "$base...$head" -- 'src/pages/**' 'src/content/**')"
          {
            echo 'files<<EOF'
            printf '%s\n' "$changed"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Resolve scan mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=changed-only" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch previous weekly audit body (for trend arrows)
        if: github.event_name != 'pull_request'
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Most recent seo-audit issue in any state (closed by next run, but could still be open).
          prev_body="$(gh issue list --label seo-audit --state all --limit 1 --json body --jq '.[0].body // ""' || echo '')"
          {
            echo 'body<<SEOPREV_EOF'
            printf '%s\n' "$prev_body"
            echo 'SEOPREV_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run SEO review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCAN_MODE: ${{ steps.mode.outputs.value }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          DIST_DIR: dist/client
          OUTPUT_FILE: .tmp/seo-review.md
          PREVIOUS_AUDIT_BODY: ${{ steps.prev.outputs.body }}
        run: node scripts/seo-review.mjs

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: seo-review-bot
          path: .tmp/seo-review.md

      - name: Open weekly audit issue
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%d)"
          TITLE="SEO Audit — ${DATE}"
          BODY_FILE=".tmp/seo-review.md"
          # Ensure label exists (idempotent).
          gh label create seo-audit --color BFD4F2 --description "Weekly SEO audit reports" 2>/dev/null || true
          # Close any older open audit issues to keep the list tidy.
          gh issue list --label seo-audit --state open --json number,title \
            --jq '.[] | select(.title != "'"$TITLE"'") | .number' \
            | xargs -I{} gh issue close {} --comment "Superseded by ${TITLE}." || true
          gh issue create \
            --title "$TITLE" \
            --label seo-audit \
            --body-file "$BODY_FILE"
