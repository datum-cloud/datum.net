services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - datum-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  dev:
    build:
      context: .
      target: development
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
      - persistent-data:/app/.persistent
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - datum-network
    command: npm run dev --

  prod:
    build:
      context: .
      target: production
    ports:
      - "4321:4321"
    volumes:
      - persistent-data:/app/.persistent
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    env_file:
      - .env
    networks:
      - datum-network
    restart: unless-stopped

networks:
  datum-network:
    driver: bridge

volumes:
  persistent-data:
    driver: local
